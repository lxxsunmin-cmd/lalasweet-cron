name: keepalive
# 스케줄 워크플로우는 repo 60일 무활동 시 자동 비활성화됨 → 월 1회 빈 커밋으로 활동 유지(영구 가동).
on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "keepalive $(date -u +%F)"
          git push
