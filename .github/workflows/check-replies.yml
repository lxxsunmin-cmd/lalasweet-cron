name: check-replies
on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/5 * * * *"
permissions: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping check-replies
        env:
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          code=$(curl -fsS -X POST "https://lalasweet-console.vercel.app/api/cron/check-replies" \
            -H "Authorization: Bearer $SECRET" -o /dev/null -w "%{http_code}")
          echo "HTTP $code"
